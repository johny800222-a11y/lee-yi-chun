services:
  - type: web
    name: portfolio-app
    runtime: python
    buildCommand: pip install -r requirements_portfolio.txt
    startCommand: gunicorn portfolio_app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4
    envVars:
      - key: JSONBIN_API_KEY
        sync: false          # 在 Render Dashboard 手動填入
      - key: JSONBIN_BIN_ID
        sync: false          # 在 Render Dashboard 手動填入
      - key: JSONBIN_MANUAL_BIN_ID
        sync: false          # 在 Render Dashboard 手動填入（手動持倉用）
      - key: PYTHON_VERSION
        value: 3.11.0
